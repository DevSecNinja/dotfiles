# mise configuration for dotfiles repository
# https://mise.jdx.dev/configuration.html

# Global tool versions used in this project
[tools]
# Python for validation scripts and tooling
python = "3.14.4"

# Go Task for task runner
task = "latest"

# Chezmoi for dotfile management
chezmoi = "latest"

# Bats for bash testing
bats = "1.13.0"

# Lefthook for managing git hooks
lefthook = "latest"

# Shell linting and formatting (used by lefthook hooks)
shellcheck = "latest"
shfmt = "latest"

# Release tooling: cocogitto drives `cog bump`, git-cliff renders CHANGELOG.md
# and release notes. See cog.toml, cliff.toml, .github/workflows/release.yml.
cocogitto = "latest"
git-cliff = "latest"

# Additional tools for development (commented out by default)
# Uncomment based on your needs
# node = "lts"
# go = "1.22"

# Environment variables
[env]
# Add mise bin directory to PATH
_.path = ["~/.local/share/mise/shims"]

# Python settings
PYTHONDONTWRITEBYTECODE = "1"  # Prevent .pyc files

# Aliases for common commands
[tool_alias]
# Upgrade all tools
upgrade = "mise upgrade"

# Settings for specific tools
[settings]
# Auto-activate mise when entering directory
experimental = true

# Legacy version file support (.python-version, .node-version, etc.)
legacy_version_file = true

# Verbose mode for debugging
verbose = false

# Tasks (experimental feature - complements Taskfile.yml)
# Uncomment to use mise tasks instead of or alongside go-task
# [tasks]
# [tasks.validate]
# description = "Run all validation checks"
# run = "./tests/bash/run-tests.sh --ci && lefthook run pre-commit --all-files"

# [tasks.test]
# description = "Run tests"
# run = "./tests/bash/run-tests.sh --ci"

# [tasks.install]
