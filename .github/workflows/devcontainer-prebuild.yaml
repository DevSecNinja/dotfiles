name: Prebuild Devcontainer

on:
  push:
    branches: [main]
    # Tag pushes (v*) build a release-pinned multi-arch manifest list tagged
    # as :vX.Y.Z, plus a build-provenance attestation for the manifest digest.
    # Source must be the tagged commit so the
    # image bytes correspond to the release source tree. Path filters
    # below only apply to branch pushes — tag pushes always run.
    tags:
      - 'v*'
    paths:
      - '.devcontainer/**'
      - 'home/**'
      - 'script/devcontainer-software-manifest.sh'
      - 'script/devcontainer-image-size.sh'
      - '.github/workflows/devcontainer-prebuild.yaml'
  pull_request:
    branches: [main]
    paths:
      - '.devcontainer/**'
      - 'home/**'
      - 'script/devcontainer-software-manifest.sh'
      - 'script/devcontainer-image-size.sh'
      - '.github/workflows/devcontainer-prebuild.yaml'
  schedule:
    # Weekly on Mondays at 00:00
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_BASENAME: dotfiles-devcontainer

jobs:
  prebuild:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Harden runner
        # renovate: datasource=github-tags depName=DevSecNinja/.github
        uses: DevSecNinja/.github/actions/harden-runner@bf22fcfcb4ef94a359eed55cea4b5ce7f5b98167 # main

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set lowercase repository owner
        id: lowercase
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dev Container CLI
        # renovate: datasource=npm depName=@devcontainers/cli
        run: npm install -g @devcontainers/cli@0.87.0

      - name: Set up Docker Buildx
        # push-by-digest=true (used in the pre-build step) requires the
        # docker-container driver; the runner default docker driver does not
        # support it.  Create the builder manually rather than using the
        # setup-buildx action from docker/ to avoid a separate Docker Hub
        # authentication round-trip introduced by that action.
        run: docker buildx create --use --driver docker-container --name devcontainer-builder --bootstrap

      - name: Decide whether to push
        id: push
        # Push on main branch and on v* tags for push/dispatch/schedule events.
        # PRs (and any other ref) build for validation only.
        run: |
          enabled=false
          case "${{ github.event_name }}" in
            push|workflow_dispatch|schedule)
              case "${{ github.ref }}" in
                refs/heads/main|refs/tags/v*) enabled=true ;;
              esac
              ;;
          esac
          echo "enabled=${enabled}" >> "$GITHUB_OUTPUT"

      - name: Pre-build dev container image
        id: build
        # Each architecture is built on its native runner and pushed BY DIGEST
        # only — no per-arch :amd64 / :arm64 tags are created. The merge job
        # composes the multi-arch :latest / :vX.Y.Z manifests from the exact
        # per-arch digests produced in this same run, so the published tags
        # always reference matching, in-sync platform images (no stray
        # architecture tags, mirroring how upstream projects publish).
        env:
          DOTFILES_DEVCONTAINER_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          DOTFILES_DEVCONTAINER_REVISION: ${{ github.sha }}
          IMAGE: ghcr.io/${{ steps.lowercase.outputs.owner }}/${{ env.IMAGE_BASENAME }}
          PLATFORM: ${{ matrix.platform }}
          PUSH_ENABLED: ${{ steps.push.outputs.enabled }}
        run: |
          set -euo pipefail
          # Reuse the previously published multi-arch image as a layer cache
          # source. Buildkit selects the cache entry matching the build
          # platform and treats a missing reference as a no-op, so this is
          # safe on the very first build too. Inline cache metadata (enabled
          # by the Dev Container CLI) is embedded into the pushed image.
          if [ "${PUSH_ENABLED}" = "true" ]; then
            devcontainer build \
              --workspace-folder . \
              --config .devcontainer/devcontainer-prebuild.json \
              --platform "${PLATFORM}" \
              --image-name "${IMAGE}" \
              --cache-from "type=registry,ref=${IMAGE}:latest" \
              --output "type=image,name=${IMAGE},push-by-digest=true,name-canonical=true,push=true" \
              2>&1 | tee build.log
            digest="$(grep -oE 'exporting manifest list sha256:[0-9a-f]{64}' build.log | tail -n1 | sed 's/.*sha256:/sha256:/' || true)"
            if [ -z "${digest}" ]; then
              digest="$(grep -oE 'exporting manifest sha256:[0-9a-f]{64}' build.log | tail -n1 | sed 's/.*sha256:/sha256:/' || true)"
            fi
            if [ -z "${digest}" ]; then
              echo "::error::Could not determine the pushed image digest for ${{ matrix.arch }}"
              exit 1
            fi
            echo "Pushed ${IMAGE}@${digest} (${PLATFORM})"
            echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          else
            # Validation-only build for pull requests (no registry push).
            devcontainer build \
              --workspace-folder . \
              --config .devcontainer/devcontainer-prebuild.json \
              --platform "${PLATFORM}" \
              --image-name "${IMAGE}" \
              --cache-from "type=registry,ref=${IMAGE}:latest"
          fi

      - name: Export image digest
        if: steps.push.outputs.enabled == 'true'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p digests
          printf '%s' "${DIGEST}" > "digests/${{ matrix.arch }}"

      - name: Upload image digest
        if: steps.push.outputs.enabled == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.arch }}
          path: digests/${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create Multi-Platform Manifest
    runs-on: ubuntu-24.04
    needs: prebuild
    # Merge when images were actually pushed: main, schedule, dispatch, or v* tag.
    if: |
      github.ref == 'refs/heads/main'
      || startsWith(github.ref, 'refs/tags/v')
      || github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      # Required for actions/attest-build-provenance on tag pushes
      # (no-op for main/schedule/dispatch since the step is gated).
      id-token: write
      attestations: write

    steps:
      - name: Harden runner
        # renovate: datasource=github-tags depName=DevSecNinja/.github
        uses: DevSecNinja/.github/actions/harden-runner@bf22fcfcb4ef94a359eed55cea4b5ce7f5b98167 # main

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set lowercase repository owner
        id: lowercase
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Determine release context
        id: release
        run: |
          {
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              version="${GITHUB_REF_NAME}"
              echo "is-release=true"
              echo "version=${version}"
            else
              echo "is-release=false"
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: digests
          pattern: digest-*
          merge-multiple: true

      - name: Collect per-arch digests
        id: digests
        run: |
          set -euo pipefail
          amd64="$(cat digests/amd64)"
          arm64="$(cat digests/arm64)"
          if [ -z "${amd64}" ] || [ -z "${arm64}" ]; then
            echo "::error::Missing per-arch digest (amd64='${amd64}' arm64='${arm64}')"
            exit 1
          fi
          echo "amd64=${amd64}" >> "$GITHUB_OUTPUT"
          echo "arm64=${arm64}" >> "$GITHUB_OUTPUT"

      - name: Create and push :latest manifest
        # :latest is always refreshed from the per-arch images built in THIS
        # run, referenced by their immutable digests. No separate :amd64 /
        # :arm64 tags exist — the per-arch images are stored untagged and are
        # reachable only through this multi-arch manifest list.
        env:
          IMAGE: ghcr.io/${{ steps.lowercase.outputs.owner }}/${{ env.IMAGE_BASENAME }}
          AMD64_DIGEST: ${{ steps.digests.outputs.amd64 }}
          ARM64_DIGEST: ${{ steps.digests.outputs.arm64 }}
        run: |
          set -euo pipefail
          docker buildx imagetools create --tag "${IMAGE}:latest" \
            "${IMAGE}@${AMD64_DIGEST}" \
            "${IMAGE}@${ARM64_DIGEST}"

      - name: Create and push release manifest tags
        if: steps.release.outputs.is-release == 'true'
        id: release-manifest
        # Build :vX.Y.Z from the SAME per-arch digests built in this run. The
        # manifest list stores those digests directly, so the release tag is
        # immutable and stays pinned regardless of future main builds.
        env:
          IMAGE: ghcr.io/${{ steps.lowercase.outputs.owner }}/${{ env.IMAGE_BASENAME }}
          VERSION: ${{ steps.release.outputs.version }}
          AMD64_DIGEST: ${{ steps.digests.outputs.amd64 }}
          ARM64_DIGEST: ${{ steps.digests.outputs.arm64 }}
        run: |
          set -euo pipefail
          docker buildx imagetools create --tag "${IMAGE}:${VERSION}" \
            "${IMAGE}@${AMD64_DIGEST}" \
            "${IMAGE}@${ARM64_DIGEST}"
          digest="$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{.Manifest.Digest}}')"
          if [ -z "${digest}" ]; then
            echo "::error::Failed to capture manifest digest for ${VERSION}"
            exit 1
          fi
          echo "Pushed ${IMAGE}:${VERSION} -> ${digest}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Export devcontainer release notes
        env:
          VERSION: ${{ steps.release.outputs.version || 'latest' }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ steps.lowercase.outputs.owner }}/${{ env.IMAGE_BASENAME }}"
          outdir="dist/devcontainer"
          mkdir -p "${outdir}"
          container="$(docker create --platform linux/amd64 "${IMAGE}:${VERSION}")"
          trap 'docker rm -f "${container}" >/dev/null 2>&1 || true' EXIT
          docker cp "${container}:/usr/local/share/dotfiles-devcontainer/manifest.md" \
            "${outdir}/devcontainer-${VERSION}-manifest.md"
          docker cp "${container}:/usr/local/share/dotfiles-devcontainer/release-notes.md" \
            "${outdir}/devcontainer-${VERSION}-release-notes.md"
          # Append published image storage sizes (compressed, per platform) so
          # the release notes, uploaded artifact and step summary surface them.
          printf '\n' >> "${outdir}/devcontainer-${VERSION}-release-notes.md"
          script/devcontainer-image-size.sh "${IMAGE}:${VERSION}" \
            >> "${outdir}/devcontainer-${VERSION}-release-notes.md"
          {
            printf '## Devcontainer prebuild\n\n'
            cat "${outdir}/devcontainer-${VERSION}-release-notes.md"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload devcontainer software manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: devcontainer-${{ steps.release.outputs.version || 'latest' }}-software-manifest
          path: dist/devcontainer/*.md
          if-no-files-found: error

      - name: Attest devcontainer image build provenance
        if: steps.release.outputs.is-release == 'true'
        # Provenance for the multi-arch release manifest. Verify with:
        #   gh attestation verify \
        #     oci://ghcr.io/devsecninja/dotfiles-devcontainer:vX.Y.Z \
        #     --repo DevSecNinja/dotfiles
        # renovate: datasource=github-tags depName=actions/attest-build-provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.release-manifest.outputs.image }}
          subject-digest: ${{ steps.release-manifest.outputs.digest }}
          push-to-registry: true

  # --- Page on main-branch / scheduled / dispatch / tag failure (homelab IRM pager) ---
  # PR runs are excluded — they only build for validation and a red PR check
  # is signal enough.
  notify-irm:
    name: Notify Grafana IRM
    needs:
      - prebuild
      - merge
    if: ${{ always() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Harden runner
        # renovate: datasource=github-tags depName=DevSecNinja/.github
        uses: DevSecNinja/.github/actions/harden-runner@bf22fcfcb4ef94a359eed55cea4b5ce7f5b98167 # main

      - name: Notify Grafana IRM
        uses: DevSecNinja/.github/.github/actions/notify-irm@b2509636243e456253c938184dfe1855d6401e6d # main
        with:
          webhook-url: ${{ secrets.GRAFANA_IRM_WEBHOOK_URL }}
          # `needs.*.result` is system-controlled, safe to interpolate.
          job-failed: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
