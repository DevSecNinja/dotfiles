name: Prebuild Devcontainer

on:
  push:
    branches: [main]
    # Tag pushes (v*) build a release-pinned multi-arch manifest list tagged
    # as :vX.Y.Z, plus a build-provenance attestation for the manifest digest.
    # Source must be the tagged commit so the
    # image bytes correspond to the release source tree. Path filters
    # below only apply to branch pushes — tag pushes always run.
    tags:
      - 'v*'
    paths:
      - '.devcontainer/**'
      - 'home/**'
      - 'script/devcontainer-software-manifest.sh'
      - '.github/workflows/devcontainer-prebuild.yaml'
  pull_request:
    branches: [main]
    paths:
      - '.devcontainer/**'
      - 'home/**'
      - 'script/devcontainer-software-manifest.sh'
      - '.github/workflows/devcontainer-prebuild.yaml'
  schedule:
    # Weekly on Mondays at 00:00
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  packages: write

env:
  IMAGE_BASENAME: dotfiles-devcontainer
  PREBUILD_COOLDOWN_HOURS: 6

jobs:
  cooldown:
    name: Check cooldown
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      should-run: ${{ steps.decision.outputs.should-run }}
    steps:
      - name: Harden runner
        # renovate: datasource=github-tags depName=DevSecNinja/.github
        uses: DevSecNinja/.github/actions/harden-runner@bf22fcfcb4ef94a359eed55cea4b5ce7f5b98167 # main

      - name: Check recent successful prebuild
        id: decision
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COOLDOWN_HOURS: ${{ env.PREBUILD_COOLDOWN_HOURS }}
        run: |
          set -euo pipefail

          echo "should-run=true" >> "$GITHUB_OUTPUT"

          if [ "$GITHUB_EVENT_NAME" != "push" ] || [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Cooldown applies only to main-branch push events."
            exit 0
          fi

          workflow_file="${GITHUB_WORKFLOW_REF#${GITHUB_REPOSITORY}/.github/workflows/}"
          workflow_file="${workflow_file%@*}"
          # The workflow API accepts a workflow file basename, not a path.
          if [ -z "$workflow_file" ]; then
            echo "::warning::Could not derive workflow file name from GITHUB_WORKFLOW_REF=${GITHUB_WORKFLOW_REF}; running prebuild."
            exit 0
          fi
          if [ "$workflow_file" = "$GITHUB_WORKFLOW_REF" ]; then
            echo "::warning::Could not derive workflow file name from GITHUB_WORKFLOW_REF=${GITHUB_WORKFLOW_REF}; running prebuild."
            exit 0
          fi
          if [ "$workflow_file" != "${workflow_file##*/}" ]; then
            echo "::warning::Could not derive workflow file name from GITHUB_WORKFLOW_REF=${GITHUB_WORKFLOW_REF}; running prebuild."
            exit 0
          fi

          if ! latest_created="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_file}/runs?branch=${GITHUB_REF_NAME}&event=push&status=success&per_page=1" \
              --jq '.workflow_runs[0].created_at // ""'
          )"; then
            echo "::warning::Could not query previous prebuild runs; running prebuild."
            exit 0
          fi

          if [ -z "$latest_created" ]; then
            echo "No previous successful main-branch prebuild found."
            exit 0
          fi

          cooldown_error="$(mktemp)"
          if ! within_cooldown="$(python3 - "$latest_created" "$COOLDOWN_HOURS" 2>"$cooldown_error" <<'PY'
          from datetime import datetime, timedelta, timezone
          import sys

          created_at = sys.argv[1]
          cooldown_hours = float(sys.argv[2])
          created = datetime.fromisoformat(created_at.replace("Z", "+00:00"))
          print("true" if datetime.now(timezone.utc) - created < timedelta(hours=cooldown_hours) else "false")
          PY
          )"; then
            error_detail="$(cat "$cooldown_error")"
            rm -f "$cooldown_error"
            echo "::warning::Could not evaluate prebuild cooldown: ${error_detail:-unknown error}; running prebuild."
            exit 0
          fi
          rm -f "$cooldown_error"

          if [ "$within_cooldown" = "true" ]; then
            echo "should-run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping prebuild: successful run at ${latest_created} is within ${COOLDOWN_HOURS} hours."
          else
            echo "Latest successful run at ${latest_created} is outside the ${COOLDOWN_HOURS}-hour cooldown."
          fi

  prebuild:
    name: Build (${{ matrix.arch }})
    needs: cooldown
    if: needs.cooldown.outputs.should-run == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Harden runner
        # renovate: datasource=github-tags depName=DevSecNinja/.github
        uses: DevSecNinja/.github/actions/harden-runner@bf22fcfcb4ef94a359eed55cea4b5ce7f5b98167 # main

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Set lowercase repository owner
        id: lowercase
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-build dev container image
        id: prebuild-attempt-1
        continue-on-error: true
        # Always push only the rolling per-arch tag. On v* tag pushes the
        # merge job derives the immutable release manifest list from these
        # very digests — docker manifest create resolves a tag to its
        # current digest and freezes it in the manifest list, so :vX.Y.Z
        # remains pinned even if :amd64 / :arm64 are later overwritten.
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3
        env:
          DOTFILES_DEVCONTAINER_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          DOTFILES_DEVCONTAINER_REVISION: ${{ github.sha }}
        with:
          configFile: .devcontainer/devcontainer-prebuild.json
          imageName: ghcr.io/${{ steps.lowercase.outputs.owner }}/${{ env.IMAGE_BASENAME }}
          imageTag: ${{ matrix.arch }}
          cacheFrom: ghcr.io/${{ steps.lowercase.outputs.owner }}/${{ env.IMAGE_BASENAME }}:${{ matrix.arch }}
          platform: ${{ matrix.platform }}
          # Push on main branch and on v* tags. PRs build for validation only.
          push: filter
          refFilterForPush: |
            refs/heads/main
            refs/tags/v*
          eventFilterForPush: |
            push
            workflow_dispatch
            schedule

      - name: Retry pre-build dev container image
        id: prebuild-attempt-2
        if: ${{ !cancelled() && steps.prebuild-attempt-1.outcome != 'success' }}
        continue-on-error: true
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3
        env:
          DOTFILES_DEVCONTAINER_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          DOTFILES_DEVCONTAINER_REVISION: ${{ github.sha }}
        with:
          configFile: .devcontainer/devcontainer-prebuild.json
          imageName: ghcr.io/${{ steps.lowercase.outputs.owner }}/${{ env.IMAGE_BASENAME }}
          imageTag: ${{ matrix.arch }}
          cacheFrom: ghcr.io/${{ steps.lowercase.outputs.owner }}/${{ env.IMAGE_BASENAME }}:${{ matrix.arch }}
          platform: ${{ matrix.platform }}
          # Push on main branch and on v* tags. PRs build for validation only.
          push: filter
          refFilterForPush: |
            refs/heads/main
            refs/tags/v*
          eventFilterForPush: |
            push
            workflow_dispatch
            schedule

      - name: Verify prebuild succeeded
        if: ${{ always() && !cancelled() }}
        env:
          ATTEMPT_1_OUTCOME: ${{ steps.prebuild-attempt-1.outcome }}
          ATTEMPT_2_OUTCOME: ${{ steps.prebuild-attempt-2.outcome }}
        run: |
          set -euo pipefail

          # Attempt 2 is expected to be skipped when attempt 1 succeeds; any success is enough.
          if [ "$ATTEMPT_1_OUTCOME" = "success" ] || [ "$ATTEMPT_2_OUTCOME" = "success" ]; then
            exit 0
          fi

          echo "::error::Devcontainer prebuild failed after retry"
          exit 1

  merge:
    name: Create Multi-Platform Manifest
    runs-on: ubuntu-24.04
    needs: prebuild
    # Merge when images were actually pushed: main, schedule, dispatch, or v* tag.
    # The prebuild job fails unless its verification step saw a successful build attempt.
    if: |
      needs.prebuild.result == 'success'
      && (
        github.ref == 'refs/heads/main'
        || startsWith(github.ref, 'refs/tags/v')
        || github.event_name == 'workflow_dispatch'
        || github.event_name == 'schedule'
      )
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      # Required for actions/attest-build-provenance on tag pushes
      # (no-op for main/schedule/dispatch since the step is gated).
      id-token: write
      attestations: write

    steps:
      - name: Harden runner
        # renovate: datasource=github-tags depName=DevSecNinja/.github
        uses: DevSecNinja/.github/actions/harden-runner@bf22fcfcb4ef94a359eed55cea4b5ce7f5b98167 # main

      - name: Set lowercase repository owner
        id: lowercase
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Determine release context
        id: release
        run: |
          {
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              version="${GITHUB_REF_NAME}"
              echo "is-release=true"
              echo "version=${version}"
            else
              echo "is-release=false"
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push :latest manifest
        # :latest is always refreshed. docker manifest create resolves
        # :amd64 / :arm64 to their current digests and freezes them in
        # the manifest list.
        run: |
          IMAGE="ghcr.io/${{ steps.lowercase.outputs.owner }}/${{ env.IMAGE_BASENAME }}"
          docker manifest create "${IMAGE}:latest" \
            "${IMAGE}:amd64" \
            "${IMAGE}:arm64"
          docker manifest annotate "${IMAGE}:latest" "${IMAGE}:amd64" --os linux --arch amd64
          docker manifest annotate "${IMAGE}:latest" "${IMAGE}:arm64" --os linux --arch arm64
          docker manifest push "${IMAGE}:latest"

      - name: Create and push release manifest tags
        if: steps.release.outputs.is-release == 'true'
        id: release-manifest
        # Build :vX.Y.Z from the SAME per-arch :amd64 / :arm64 digests pushed
        # in this run. docker resolves tag→digest at create time and the
        # manifest list stores the digest, so the release tag remains pinned
        # even if the rolling :amd64 / :arm64 tags are overwritten by a future
        # main build.
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          IMAGE="ghcr.io/${{ steps.lowercase.outputs.owner }}/${{ env.IMAGE_BASENAME }}"
          docker manifest create "${IMAGE}:${VERSION}" \
            "${IMAGE}:amd64" \
            "${IMAGE}:arm64"
          docker manifest annotate "${IMAGE}:${VERSION}" "${IMAGE}:amd64" --os linux --arch amd64
          docker manifest annotate "${IMAGE}:${VERSION}" "${IMAGE}:arm64" --os linux --arch arm64
          # docker manifest push prints the manifest list digest on stdout.
          digest="$(docker manifest push "${IMAGE}:${VERSION}")"
          echo "Pushed ${IMAGE}:${VERSION} -> ${digest}"
          if [ -z "${digest}" ]; then
            echo "::error::Failed to capture manifest digest for ${VERSION}"
            exit 1
          fi
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Export devcontainer release notes
        env:
          VERSION: ${{ steps.release.outputs.version || 'latest' }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ steps.lowercase.outputs.owner }}/${{ env.IMAGE_BASENAME }}"
          outdir="dist/devcontainer"
          mkdir -p "${outdir}"
          container="$(docker create --platform linux/amd64 "${IMAGE}:${VERSION}")"
          trap 'docker rm -f "${container}" >/dev/null 2>&1 || true' EXIT
          docker cp "${container}:/usr/local/share/dotfiles-devcontainer/manifest.md" \
            "${outdir}/devcontainer-${VERSION}-manifest.md"
          docker cp "${container}:/usr/local/share/dotfiles-devcontainer/release-notes.md" \
            "${outdir}/devcontainer-${VERSION}-release-notes.md"
          {
            printf '## Devcontainer prebuild\n\n'
            cat "${outdir}/devcontainer-${VERSION}-release-notes.md"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload devcontainer software manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: devcontainer-${{ steps.release.outputs.version || 'latest' }}-software-manifest
          path: dist/devcontainer/*.md
          if-no-files-found: error

      - name: Attest devcontainer image build provenance
        if: steps.release.outputs.is-release == 'true'
        # Provenance for the multi-arch release manifest. Verify with:
        #   gh attestation verify \
        #     oci://ghcr.io/devsecninja/dotfiles-devcontainer:vX.Y.Z \
        #     --repo DevSecNinja/dotfiles
        # renovate: datasource=github-tags depName=actions/attest-build-provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.release-manifest.outputs.image }}
          subject-digest: ${{ steps.release-manifest.outputs.digest }}
          push-to-registry: true

  # --- Page on main-branch / scheduled / dispatch / tag failure (homelab IRM pager) ---
  # PR runs are excluded — they only build for validation and a red PR check
  # is signal enough.
  notify-irm:
    name: Notify Grafana IRM
    needs:
      - prebuild
      - merge
    if: ${{ always() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Harden runner
        # renovate: datasource=github-tags depName=DevSecNinja/.github
        uses: DevSecNinja/.github/actions/harden-runner@bf22fcfcb4ef94a359eed55cea4b5ce7f5b98167 # main

      - name: Notify Grafana IRM
        uses: DevSecNinja/.github/.github/actions/notify-irm@b2509636243e456253c938184dfe1855d6401e6d # main
        with:
          webhook-url: ${{ secrets.GRAFANA_IRM_WEBHOOK_URL }}
          # `needs.*.result` is system-controlled, safe to interpolate.
          job-failed: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
