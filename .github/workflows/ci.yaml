name: CI

# PR-only (plus dispatch). Branch protection makes the merge commit
# identical to the last PR head, so re-running on push to main is
# duplicate work. See DevSecNinja/.github docs/workflow-trigger-conventions.md.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Dotfiles
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: Install shells required by validation tests
        # Fish and Zsh are required so the validation BATS tests do not
        # skip syntax/startup checks against shell configurations.
        # See: tests/bash/validate-fish-config.bats, tests/bash/test-clean-shell-startup.bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fish zsh

      - name: Install Chezmoi
        # Chezmoi is required so the validation BATS tests can verify
        # the chezmoi configuration and dry-run apply rather than skipping.
        # See: tests/bash/validate-chezmoi.bats, tests/bash/test-chezmoi-apply.bats
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run lefthook checks (pull request changes)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          changed_files="$(git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}" HEAD)"
          if [ -z "$changed_files" ]; then
            echo "No PR files changed"
            exit 0
          fi
          lefthook_args=(run pre-commit)
          while IFS= read -r file; do
            lefthook_args+=(--file "$file")
          done <<< "$changed_files"
          mise exec -- lefthook "${lefthook_args[@]}"

      - name: Run validation tests
        run: ./tests/bash/run-tests.sh --ci

  test-devcontainer:
    name: Test Devcontainer Deployment
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Set lowercase repository owner
        id: lowercase
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-devcontainer-${{ hashFiles('.devcontainer/devcontainer.json', 'home/install.sh') }}
          restore-keys: |
            ${{ runner.os }}-devcontainer-

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Build and start devcontainer
        run: |
          set -e
          echo "🏗️  Building and starting devcontainer from .devcontainer/devcontainer.json..."

          # Build and start the devcontainer (includes postCreateCommand execution)
          # Use prebuilt image and local cache for faster builds
          BUILDX_NO_DEFAULT_ATTESTATIONS=1 devcontainer up --workspace-folder . \
            --cache-from type=registry,ref=ghcr.io/${{ steps.lowercase.outputs.owner }}/dotfiles-devcontainer:latest \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max

          echo "✅ Devcontainer built and started successfully"

      - name: Move cache
        run: |
          # Move cache to avoid growing cache size indefinitely
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

      - name: Test devcontainer deployment
        run: |
          set -e
          echo "🧪 Running tests inside the devcontainer..."

          # Execute the test script inside the running container
          devcontainer exec --workspace-folder . bash .github/scripts/test-devcontainer.sh

  test-install:
    name: Test Installation
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/devcontainers/base:debian-12@sha256:23fa69fed758b7927c60061317d73baf7d66b9fca5c344e80bce3a940b229af0
      env:
        CODESPACES: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run install script
        run: ./home/install.sh

      - name: Verify Chezmoi installation
        run: |
          if ! command -v "$HOME/.local/bin/chezmoi" >/dev/null 2>&1; then
            echo "❌ Chezmoi not found"
            exit 1
          fi
          echo "✅ Chezmoi installed successfully"

      - name: Verify dotfiles were applied
        run: |
          # Run verification using Bats tests
          ./tests/bash/run-tests.sh --ci --test verify-dotfiles.bats || echo "⚠️  Some dotfiles not yet applied (expected in CI)"

      - name: Run chezmoi verify
        run: |
          "$HOME/.local/bin/chezmoi" verify
          echo "✅ All managed files verified successfully"

      - name: Display chezmoi status
        run: |
          echo "📊 Chezmoi status:"
          "$HOME/.local/bin/chezmoi" managed
          echo ""
          echo "📋 Chezmoi data:"
          "$HOME/.local/bin/chezmoi" data

      - name: Test Fish configuration
        run: |
          # Run Fish configuration tests using Bats
          ./tests/bash/run-tests.sh --ci --test test-fish-config.bats || echo "⚠️  Fish tests skipped (Fish may not be installed)"

  test-coder-install:
    name: Test Coder Install Scripts (Root)
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/devcontainers/base:debian-12@sha256:23fa69fed758b7927c60061317d73baf7d66b9fca5c344e80bce3a940b229af0
      env:
        CODESPACES: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run root install script (Coder support)
        run: ./install.sh

      - name: Verify Chezmoi installation
        run: |
          if ! command -v "$HOME/.local/bin/chezmoi" >/dev/null 2>&1; then
            echo "❌ Chezmoi not found"
            exit 1
          fi
          echo "✅ Chezmoi installed successfully via root install.sh"

      - name: Verify dotfiles were applied
        run: |
          # Run verification using Bats tests
          ./tests/bash/run-tests.sh --ci --test verify-dotfiles.bats || echo "⚠️  Some dotfiles not yet applied (expected in CI)"

      - name: Display chezmoi status
        run: |
          echo "📊 Chezmoi status:"
          "$HOME/.local/bin/chezmoi" managed
          echo ""
          echo "📋 Chezmoi data:"
          "$HOME/.local/bin/chezmoi" data

  test-light-server:
    name: Test Light Server Installation
    runs-on: ubuntu-latest
    needs: [validate, test-install, test-coder-install]
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/devcontainers/base:debian-12@sha256:23fa69fed758b7927c60061317d73baf7d66b9fca5c344e80bce3a940b229af0
      options: --hostname SVLPROD01
      env:
        CODESPACES: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Test light server installation
        run: ./.github/scripts/test-light-server.sh

  test-dev-server:
    name: Test Dev Server Installation
    runs-on: ubuntu-latest
    needs: [validate, test-install, test-coder-install]
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/devcontainers/base:debian-12@sha256:23fa69fed758b7927c60061317d73baf7d66b9fca5c344e80bce3a940b229af0
      options: --hostname SVLDEV01
      env:
        CODESPACES: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Test dev server installation
        run: ./.github/scripts/test-dev-server.sh

  test-windows:
    name: Test Windows Light Installation
    runs-on: windows-latest
    needs: validate
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run Windows install script
        shell: pwsh
        run: |
          .\home\install.ps1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Install script failed"
            exit 1
          }

          # Find and add chezmoi to PATH for subsequent steps
          $chezmoiExe = Get-Command chezmoi -ErrorAction SilentlyContinue
          if ($chezmoiExe) {
            $chezmoiDir = Split-Path -Parent $chezmoiExe.Source
            echo "$chezmoiDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "✅ Added chezmoi to GitHub Actions PATH: $chezmoiDir"
          } else {
            Write-Warning "⚠️ Chezmoi not found in current session"
          }

      - name: Verify Chezmoi installation
        shell: pwsh
        run: |
          $chezmoi = Get-Command chezmoi -ErrorAction SilentlyContinue
          if (-not $chezmoi) {
            Write-Error "❌ Chezmoi not found in PATH"
            exit 1
          }
          Write-Host "✅ Chezmoi installed successfully at $($chezmoi.Source)"

      - name: Verify PowerShell profile source
        shell: pwsh
        run: |
          $profileSource = "$env:USERPROFILE\.config\powershell\profile.ps1"
          if (-not (Test-Path $profileSource)) {
            Write-Error "❌ PowerShell profile source not found at $profileSource"
            exit 1
          }
          Write-Host "✅ PowerShell profile source exists"

      - name: Verify PowerShell profile loader
        shell: pwsh
        run: |
          $profileLoader = "$env:USERPROFILE\Documents\PowerShell\profile.ps1"
          if (-not (Test-Path $profileLoader)) {
            Write-Error "❌ PowerShell profile loader not found at $profileLoader"
            exit 1
          }
          Write-Host "✅ PowerShell profile loader exists at $profileLoader"

          # Verify it loads the correct config
          $content = Get-Content $profileLoader -Raw
          if ($content -notmatch '\.config\\powershell\\profile\.ps1') {
            Write-Error "❌ Profile loader doesn't source the correct config"
            exit 1
          }
          Write-Host "✅ Profile loader correctly configured"

      - name: Verify Windows PowerShell profile loader
        shell: pwsh
        run: |
          $profileLoader = "$env:USERPROFILE\Documents\WindowsPowerShell\profile.ps1"
          if (-not (Test-Path $profileLoader)) {
            Write-Error "❌ Windows PowerShell profile loader not found at $profileLoader"
            exit 1
          }
          Write-Host "✅ Windows PowerShell profile loader exists at $profileLoader"

          # Verify it loads the correct config
          $content = Get-Content $profileLoader -Raw
          if ($content -notmatch '\.config\\powershell\\profile\.ps1') {
            Write-Error "❌ Windows PowerShell profile loader doesn't source the correct config"
            exit 1
          }
          Write-Host "✅ Windows PowerShell profile loader correctly configured"

      - name: Test PowerShell profile loading
        shell: pwsh
        run: |
          # Test that the profile loads without errors
          try {
            $profileLoader = "$env:USERPROFILE\Documents\PowerShell\profile.ps1"
            . $profileLoader
            Write-Host "✅ PowerShell profile loads successfully"
          } catch {
            Write-Error "❌ PowerShell profile failed to load: $_"
            exit 1
          }

      - name: Test Windows PowerShell profile loading
        shell: pwsh
        run: |
          # Test that the profile loads without errors
          try {
            $profileLoader = "$env:USERPROFILE\Documents\WindowsPowerShell\profile.ps1"
            . $profileLoader
            Write-Host "✅ Windows PowerShell profile loads successfully"
          } catch {
            Write-Error "❌ Windows PowerShell profile failed to load: $_"
            exit 1
          }

      - name: Display Chezmoi status
        shell: pwsh
        run: |
          Write-Host "📊 Chezmoi managed files:"
          chezmoi managed
          Write-Host ""
          Write-Host "📋 Chezmoi data:"
          chezmoi data

      - name: Verify Git configuration
        shell: pwsh
        run: |
          $gitConfigPath = "$env:USERPROFILE\.config\git\config"
          if (-not (Test-Path $gitConfigPath)) {
            Write-Error "❌ Git config not found"
            exit 1
          }
          Write-Host "✅ Git configuration applied"

  test-windows-coder:
    name: Test Windows Coder Install (Root)
    runs-on: windows-latest
    needs: validate
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run root Windows install script (Coder support)
        shell: pwsh
        run: |
          .\install.ps1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Install script failed"
            exit 1
          }

          # Find and add chezmoi to PATH for subsequent steps
          $chezmoiExe = Get-Command chezmoi -ErrorAction SilentlyContinue
          if ($chezmoiExe) {
            $chezmoiDir = Split-Path -Parent $chezmoiExe.Source
            echo "$chezmoiDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "✅ Added chezmoi to GitHub Actions PATH: $chezmoiDir"
          } else {
            Write-Warning "⚠️ Chezmoi not found in current session"
          }

      - name: Verify Chezmoi installation
        shell: pwsh
        run: |
          $chezmoi = Get-Command chezmoi -ErrorAction SilentlyContinue
          if (-not $chezmoi) {
            Write-Error "❌ Chezmoi not found in PATH"
            exit 1
          }
          Write-Host "✅ Chezmoi installed successfully via root install.ps1 at $($chezmoi.Source)"

      - name: Display Chezmoi status
        shell: pwsh
        run: |
          Write-Host "📊 Chezmoi managed files:"
          chezmoi managed
          Write-Host ""
          Write-Host "📋 Chezmoi data:"
          chezmoi data

  test-bash-scripts:
    name: Test Bash Scripts with Bats
    needs: validate
    permissions:
      contents: read
      checks: write
      pull-requests: write
    uses: ./.github/workflows/bats.yml
    with:
      # renovate: datasource=github-releases depName=jdx/mise
      mise-version: "2026.4.16"
      test-dirs: "tests/bash/"
      check-name: "Bash Test Results (Bats)"

  test-powershell-scripts:
    name: Test PowerShell Scripts with Pester
    runs-on: windows-latest
    needs: validate
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Pester
        shell: pwsh
        run: |
          Write-Host "📦 Installing Pester module..."
          Install-Module -Name Pester -Force -SkipPublisherCheck -MinimumVersion 5.0.0
          Import-Module Pester -PassThru

      - name: Run Pester Tests
        shell: pwsh
        run: |
          .\tests\powershell\Invoke-PesterTests.ps1 -CI -CodeCoverage

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pester-test-results
          path: test-results.xml

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pester-coverage-report
          path: coverage.xml
          if-no-files-found: ignore

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/windows@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        if: always()
        with:
          files: test-results.xml
          check_name: 'Pester Test Results'
          comment_mode: off
