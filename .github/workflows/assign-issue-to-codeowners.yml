---
name: Reusable — Assign issue to CODEOWNERS

on:
  workflow_call:
    inputs:
      allow-self-assign:
        description: "Allow assigning the issue to its author if they are a codeowner"
        required: false
        type: boolean
        default: true
      exclude-renovate-issues:
        description: "Exclude Renovate-created issues from assignment"
        required: false
        type: boolean
        default: true
      issue-number:
        description: "Issue number to assign. Leave empty to assign all open issues (workflow_dispatch only)."
        required: false
        type: number
        default: 0

permissions:
  contents: read

jobs:
  assign:
    name: Assign issue to CODEOWNERS
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
    steps:
      - name: Assign issue to CODEOWNERS
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          ALLOW_SELF_ASSIGN: ${{ inputs.allow-self-assign }}
          EXCLUDE_RENOVATE_ISSUES: ${{ inputs.exclude-renovate-issues }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
        with:
          script: |
            // Try to read CODEOWNERS from common locations
            const paths = ['.github/CODEOWNERS', 'CODEOWNERS', 'docs/CODEOWNERS'];
            let content = null;

            for (const path of paths) {
              try {
                const response = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: path,
                });
                content = Buffer.from(response.data.content, 'base64').toString('utf8');
                core.info(`Found CODEOWNERS at ${path}`);
                break;
              } catch (e) {
                core.info(`No CODEOWNERS at ${path}`);
              }
            }

            if (!content) {
              core.warning('No CODEOWNERS file found');
              return;
            }

            // Parse CODEOWNERS — extract owners from the global (*) pattern
            const codeowners = new Set();
            for (const line of content.split('\n')) {
              const trimmed = line.trim();
              if (!trimmed || trimmed.startsWith('#')) continue;

              const parts = trimmed.split(/\s+/);
              if (parts[0] === '*') {
                for (let i = 1; i < parts.length; i++) {
                  const owner = parts[i];
                  // Only include individual users — teams cannot be assigned to issues
                  if (owner.startsWith('@') && !owner.includes('/')) {
                    codeowners.add(owner.substring(1));
                  }
                }
              }
            }

            if (codeowners.size === 0) {
              core.warning('No assignable users found in CODEOWNERS global pattern');
              return;
            }

            // Collect target issues
            let issues = [];
            const issueNumberInput = process.env.ISSUE_NUMBER;

            if (context.payload.issue) {
              // Triggered by an issue event
              issues = [context.payload.issue];
            } else if (issueNumberInput && Number(issueNumberInput) > 0) {
              // Manual run with a specific issue number
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(issueNumberInput),
              });
              issues = [issue];
            } else {
              // Manual run without issue number — assign all open issues
              core.info('No issue number provided — fetching all open issues');
              issues = await github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
              });
              // Filter out pull requests (they also appear in the issues endpoint)
              issues = issues.filter(i => !i.pull_request);
              core.info(`Found ${issues.length} open issue(s)`);
            }

            if (process.env.EXCLUDE_RENOVATE_ISSUES === 'true') {
              const isRenovateIssue = issue => {
                const author = issue.user?.login ?? '';
                const title = issue.title ?? '';
                const labels = (issue.labels ?? []).map(label => (
                  typeof label === 'string' ? label : label.name ?? ''
                ));

                return author === 'renovate[bot]'
                  || author === 'renovate-bot'
                  || title === 'Dependency Dashboard'
                  || labels.some(label => label.toLowerCase() === 'renovate');
              };

              issues = issues.filter(issue => {
                if (!isRenovateIssue(issue)) return true;

                core.info(`Issue #${issue.number} "${issue.title}" is a Renovate issue; skipping assignment`);
                return false;
              });
            }

            if (issues.length === 0) {
              core.info('No issues to process');
              return;
            }

            for (const issue of issues) {
              const owners = new Set(codeowners);

              // Optionally remove issue author to avoid self-assignment
              if (process.env.ALLOW_SELF_ASSIGN !== 'true') {
                owners.delete(issue.user.login);

                if (owners.size === 0) {
                  core.info(`Issue #${issue.number}: no assignees after excluding author`);
                  continue;
                }
              }

              const assignees = [...owners];
              core.info(`Assigning issue #${issue.number} "${issue.title}" to: ${assignees.join(', ')}`);

              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: assignees,
              });
            }
