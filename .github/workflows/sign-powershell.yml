name: Sign PowerShell Scripts

on:
  push:
    branches:
      - main
    paths:
      - '**.ps1'
      - '!**.ps1.tmpl'  # Exclude templates - they change after chezmoi processing
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sign-scripts:
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Sign PowerShell scripts
        shell: pwsh
        env:
          CERT_BASE64: ${{ secrets.CODE_SIGNING_CERT }}
          CERT_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
        run: |
          # Load the signing script
          $signingScript = Join-Path $PWD "home" | Join-Path -ChildPath "dot_config" | Join-Path -ChildPath "powershell" | Join-Path -ChildPath "scripts" | Join-Path -ChildPath "Sign-PowerShellScripts.ps1"

          if (-not (Test-Path $signingScript)) {
            Write-Error "Sign-PowerShellScripts.ps1.tmpl not found at: $signingScript"
            exit 1
          }

          # Convert password to SecureString
          $securePassword = ConvertTo-SecureString -String $env:CERT_PASSWORD -Force -AsPlainText

          # Execute the signing script
          $stats = & $signingScript `
            -CertificateBase64 $env:CERT_BASE64 `
            -CertificatePassword $securePassword `
            -Path $PWD `
            -Exclude "*.ps1.tmpl"

          # Exit with error if any scripts failed to sign
          if ($stats.Failed -gt 0) {
            Write-Error "Failed to sign $($stats.Failed) script(s)"
            exit 1
          }

      # Branch protection on `main` blocks direct pushes from
      # `github-actions[bot]`, and we deliberately do NOT sign on pull_request
      # events (any PR author would otherwise get their scripts signed with
      # the maintainer's certificate). Instead, after a push to `main`, open a
      # follow-up PR with the signed files so the change still goes through
      # the protected-branch flow. The PR is created with the default
      # GITHUB_TOKEN, so the bot's commit will not retrigger workflows on
      # push (preventing signing loops). When the PR is merged, this workflow
      # re-runs but the composite finds no diff and exits as a no-op.
      - name: Open PR with signed scripts
        # renovate: datasource=github-tags depName=DevSecNinja/.github
        uses: DevSecNinja/.github/actions/open-pr@6764c0fb5ffc25207571b159dc255c8f77922c62 # main
        with:
          branch: chore/sign-powershell-scripts
          title: 'chore: sign PowerShell scripts'
          paths: '**/*.ps1'
          labels: |
            automated
            chore
          body: |
            Automated signing of PowerShell scripts after merge to `main`.

            Triggered by: ${{ github.event.head_commit.message }}
            Commit: ${{ github.sha }}

            Merging this PR replaces the direct push the workflow used to
            perform, which is blocked by branch protection on `main`.

      - name: Comment on PR
        if: steps.check_changes.outputs.changes == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ PowerShell scripts have been signed. Please pull the latest changes after merge.'
            })

  # --- Page on main-branch script-signing failure (homelab IRM pager) ---
  notify-irm:
    name: Notify Grafana IRM
    needs:
      - sign-scripts
    if: ${{ always() && github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Notify Grafana IRM
        uses: DevSecNinja/.github/.github/actions/notify-irm@b2509636243e456253c938184dfe1855d6401e6d # main
        with:
          webhook-url: ${{ secrets.GRAFANA_IRM_WEBHOOK_URL }}
          # `needs.*.result` is system-controlled, safe to interpolate.
          job-failed: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
