name: Sign PowerShell Scripts

on:
  push:
    branches:
      - main
    paths:
      - '**.ps1'
      - '!**.ps1.tmpl'  # Exclude templates - they change after chezmoi processing

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sign-scripts:
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Sign PowerShell scripts
        shell: pwsh
        env:
          CERT_BASE64: ${{ secrets.CODE_SIGNING_CERT }}
          CERT_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
        run: |
          # Load the signing script
          $signingScript = Join-Path $PWD "home" | Join-Path -ChildPath "dot_config" | Join-Path -ChildPath "powershell" | Join-Path -ChildPath "scripts" | Join-Path -ChildPath "Sign-PowerShellScripts.ps1"

          if (-not (Test-Path $signingScript)) {
            Write-Error "Sign-PowerShellScripts.ps1.tmpl not found at: $signingScript"
            exit 1
          }

          # Convert password to SecureString
          $securePassword = ConvertTo-SecureString -String $env:CERT_PASSWORD -Force -AsPlainText

          # Execute the signing script
          $stats = & $signingScript `
            -CertificateBase64 $env:CERT_BASE64 `
            -CertificatePassword $securePassword `
            -Path $PWD `
            -Exclude "*.ps1.tmpl"

          # Exit with error if any scripts failed to sign
          if ($stats.Failed -gt 0) {
            Write-Error "Failed to sign $($stats.Failed) script(s)"
            exit 1
          }

      - name: Check for changes
        id: check_changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected - all scripts already signed"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected - scripts were signed"
          fi

      - name: Commit signed scripts
        if: steps.check_changes.outputs.changes == 'true' && github.event_name != 'pull_request'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "*.ps1"
          git commit -m "chore: sign PowerShell scripts [skip ci]"
          git push

      - name: Comment on PR
        if: steps.check_changes.outputs.changes == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ PowerShell scripts have been signed. Please pull the latest changes after merge.'
            })

  # --- Page on main-branch script-signing failure (homelab IRM pager) ---
  notify-irm:
    name: Notify Grafana IRM
    needs:
      - sign-scripts
    if: ${{ always() && github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Notify Grafana IRM
        uses: DevSecNinja/.github/.github/actions/notify-irm@a877d35266a54e54ef043e60a290ed76b4d7b34e # main
        with:
          webhook-url: ${{ secrets.GRAFANA_IRM_WEBHOOK_URL }}
          # `needs.*.result` is system-controlled, safe to interpolate.
          job-failed: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
