---
name: "Reusable — BATS Tests"

# Reusable workflow that runs BATS tests using mise-managed tooling.
# Mirrors the approach used in DevSecNinja/truenas-apps so the two
# repositories share a consistent BATS testing workflow.

on:
  workflow_call:
    inputs:
      mise-version:
        description: "mise version to install (required, no default per ADR 0001)"
        required: true
        type: string
      test-dirs:
        description: "Space-separated list of directories to pass to bats (default: tests/bash/)"
        required: false
        type: string
        default: "tests/bash/"
      bats-args:
        description: "Additional arguments to pass to bats (e.g. --filter-tags unit)"
        required: false
        type: string
        default: ""
      check-name:
        description: "Name for the GitHub check annotation"
        required: false
        type: string
        default: "BATS Test Results"

permissions:
  contents: read

jobs:
  test:
    name: BATS
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    steps:
      - name: Harden runner
        # renovate: datasource=github-tags depName=DevSecNinja/.github
        uses: DevSecNinja/.github/actions/harden-runner@bf22fcfcb4ef94a359eed55cea4b5ce7f5b98167 # main

      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          version: ${{ inputs.mise-version }}

      - name: Install shells required by BATS tests
        # Fish and Zsh are required so the BATS tests do not skip
        # syntax/startup checks against shell configurations. Chezmoi
        # is provided via mise (see .mise.toml).
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fish zsh

      - name: Install BATS helper libraries
        run: bash tests/bash/setup_libs.sh

      - name: Run BATS tests
        env:
          BATS_ARGS: ${{ inputs.bats-args }}
          TEST_DIRS: ${{ inputs.test-dirs }}
        run: |
          # shellcheck disable=SC2086
          mise exec -- bats \
            --formatter tap \
            --report-formatter junit \
            --output . \
            ${BATS_ARGS} \
            ${TEST_DIRS}

      - name: Publish test results
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        if: always()
        with:
          report_paths: report.xml
          check_name: ${{ inputs.check-name }}

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: bats-test-results
          path: report.xml
          retention-days: 30
