---
name: Sync Develop Branch

# Automatically update the develop branch whenever commits are merged to main.
# This ensures develop stays in sync with main without manual intervention.

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync-develop:
    name: Update Develop Branch
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Harden runner
        # renovate: datasource=github-tags depName=DevSecNinja/.github
        uses: DevSecNinja/.github/actions/harden-runner@bf22fcfcb4ef94a359eed55cea4b5ce7f5b98167 # main

      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for other merges
        run: |
          echo "⏳ Waiting 60 seconds for other potential merges to complete..."
          sleep 60
          echo "✅ Wait complete, proceeding with sync"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync develop branch
        run: |
          # Fetch the latest develop branch
          git fetch origin develop:develop

          # Checkout develop branch
          git checkout develop

          # Merge main into develop
          git merge origin/main --no-edit \
            -m "chore: sync develop with main [skip ci]"

          # Push changes to develop
          git push origin develop

      - name: Report status
        if: success()
        run: |
          echo "✅ Successfully synced develop branch with main"

      - name: Report failure
        if: failure()
        run: |
          echo "❌ Failed to sync develop branch"
          echo "May require manual intervention if there are merge conflicts"
