---
name: Release

# Triggered on tag push (`v*`) rather than `release: created` because
# the latter does not fire reliably when release-please creates the
# draft Release via its GitHub App token. Tag push events propagate
# correctly and run before/independently of the draft creation.
#
# Flow:
#   1. release-please merges its release PR.
#   2. release-please pushes the `vX.Y.Z` tag (force-tag-creation: true)
#      and creates the draft GitHub Release (draft: true).
#   3. This workflow fires on the tag push, looks up the (already
#      existing) draft Release for that tag, then:
#        a. Builds log.sh artifacts and the tarball.
#        b. Mints build-provenance attestations against the caller's
#           OIDC subject (must stay in this caller, NOT a composite —
#           see actions/attest-build-provenance README).
#        c. Uploads the four assets to the draft.
#        d. Appends the log.sh consumption + provenance snippet to
#           release-please's auto-generated notes.
#        e. Flips `--draft=false` to publish.
#
# Drafts are mutable, so the upload + notes-edit + publish sequence
# is compatible with Immutable Releases (which only constrain the
# Release once *published*).
#
# `workflow_dispatch` is exposed so failed runs can be retried
# manually by tag without a fresh release-please bump.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)publish, e.g. v0.2.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, attest, and publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      # Required by actions/attest-build-provenance to mint the OIDC token
      # used as the Sigstore signing identity. Must stay declared in the
      # caller workflow (not the composite) — see the action's README.
      id-token: write
      attestations: write
    env:
      # Tag from either trigger. `github.ref_name` is the short tag name
      # for `push: tags` (e.g. "v0.2.0") and the branch for dispatch,
      # so the dispatch input takes precedence when set.
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Build log.sh release artifacts
        run: ./script/build-log-sh-release.sh "${TAG}" "${GITHUB_WORKSPACE}/dist"

      - name: Verify checksums
        working-directory: dist
        run: |
          sha256sum -c log.sh.sha256
          sha256sum -c "log-sh-${TAG}.tar.gz.sha256"

      - name: Generate build-provenance attestations
        # Attests log.sh and the tarball to the GitHub Actions OIDC identity
        # via Sigstore. Verifiable with `gh attestation verify <file>`.
        # Sidecar .sha256 files are intentionally not attested — their
        # integrity is already proven by re-hashing the content they cover.
        # Stays in the caller (not the composite) so the OIDC subject is
        # this repo, not DevSecNinja/.github.
        # renovate: datasource=github-tags depName=actions/attest-build-provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/log.sh
            dist/log-sh-${{ inputs.tag || github.ref_name }}.tar.gz

      - name: Compose release notes (release-please body + log.sh snippet)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Fetch the draft Release body release-please created for this
          # tag. `gh release view --json body` returns the auto-generated
          # CHANGELOG slice as plain markdown.
          gh release view "${TAG}" --repo "${REPO}" --json body --jq '.body' >/tmp/release-notes.md
          # Append the log.sh consumption + provenance verification block.
          {
            printf '\n\n---\n\n'
            printf '## log.sh distribution\n\n'
            printf 'This release includes a vendorable copy of `log.sh`. See '
            printf '[docs/logging.md](https://github.com/%s/blob/%s/docs/logging.md#consuming-logsh-from-other-repositories) ' \
                "${REPO}" "${TAG}"
            printf 'for the consumption snippet.\n\n'
            printf '### Quick start\n\n'
            printf '```sh\n'
            printf 'curl -fsSL https://github.com/%s/releases/download/%s/log.sh -o scripts/lib/log.sh\n' \
                "${REPO}" "${TAG}"
            printf 'curl -fsSL https://github.com/%s/releases/download/%s/log.sh.sha256 -o scripts/lib/log.sh.sha256\n' \
                "${REPO}" "${TAG}"
            printf '( cd scripts/lib && sha256sum -c log.sh.sha256 )\n'
            printf '```\n\n'
            printf '### Verifying provenance\n\n'
            printf 'Each binary asset is attested via [GitHub Artifact Attestations](https://docs.github.com/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds). '
            printf 'Verify with the GitHub CLI:\n\n'
            printf '```sh\n'
            printf 'gh attestation verify ./log.sh --repo %s\n' "${REPO}"
            printf 'gh attestation verify ./log-sh-%s.tar.gz --repo %s\n' "${TAG}" "${REPO}"
            printf '```\n'
          } >>/tmp/release-notes.md

      - name: Upload assets and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release upload "${TAG}" \
              --repo "${REPO}" \
              "dist/log.sh" \
              "dist/log.sh.sha256" \
              "dist/log-sh-${TAG}.tar.gz" \
              "dist/log-sh-${TAG}.tar.gz.sha256"
          # Edit notes and flip the draft flag in a single API call so
          # the release transitions to "published" atomically — this is
          # the moment Immutable Releases lock the Release down.
          gh release edit "${TAG}" \
              --repo "${REPO}" \
              --notes-file /tmp/release-notes.md \
              --draft=false

  # --- Page on release-publish failure (homelab IRM pager) ---
  # alert_uid is keyed on the tag, so each release has its own alert
  # group. resolve-on-success is disabled because there is no
  # subsequent run on the same tag to post a green resolve.
  notify-irm:
    name: Notify Grafana IRM
    needs:
      - release
    # Run on both tag-push and workflow_dispatch so manual reruns
    # also page. `always()` ensures we still notify on a failed
    # release job; the action itself decides resolved vs firing
    # based on the `release` job's `result`.
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Notify Grafana IRM
        uses: DevSecNinja/.github/.github/actions/notify-irm@b2509636243e456253c938184dfe1855d6401e6d # main
        with:
          webhook-url: ${{ secrets.GRAFANA_IRM_WEBHOOK_URL }}
          # `needs.*.result` is system-controlled, safe to interpolate.
          job-failed: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
          resolve-on-success: "false"
