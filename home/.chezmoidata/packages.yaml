# Cross-platform package definitions for Chezmoi dotfiles
# Packages are organized by OS and package manager
# Installation modes: light (essential) + full (light + additional packages)

packages:
  # Linux packages
  linux:
    # APT packages (Debian/Ubuntu)
    apt:
      # PPAs to install (Ubuntu/derivatives only)
      ppas:
        light:
          - ppa:zhangsongcui3371/fastfetch
        full: []
      light:
        - curl
        - fastfetch
        - fish
        - git
        - jq
        - python3-venv
        - python3-pip
        - vim
        - wget
        - yq
        - zsh
      full:
        - gh # GitHub CLI
      # Installed only when useYubiKey is true.
      yubikey:
        - yubikey-manager # provides `ykman` CLI
        - pcscd # smart-card daemon (required for OATH)
        - scdaemon
    brew:
      light: []
      full:
        - copilot-cli # GitHub Copilot CLI
        - go-task
        - microsoft/apm/apm
        - mise
      yubikey:
        - ykman

    # DNF packages (Fedora/RHEL/CentOS)
    dnf:
      light: []
      full: []
      yubikey:
        - yubikey-manager
        - pcsc-lite

  # macOS packages
  darwin:
    # Homebrew installs are grouped by kind:
    #   brew.brew      -> Homebrew formulas (CLI tools)
    #   brew.cask      -> Homebrew casks (GUI applications)
    #   brew.app-store -> Mac App Store apps (installed via `mas`)
    brew:
      # Homebrew formulas (CLI tools)
      brew:
        light:
          - fastfetch
          - fish
          - git
          - jq
          - vim
          - wget
        full:
          - azure-cli
          - copilot-cli # GitHub Copilot CLI
          - go-task
          - mas # Mac App Store CLI (required for brew.app-store installs)
          - microsoft/apm/apm
          - mise
          - python@3
        # Installed only when useYubiKey is true.
        yubikey:
          - ykman
          - openssh # macOS bundled OpenSSH lacks FIDO2 / SecurityKeyProvider
      # Homebrew casks (GUI applications)
      cask:
        light: []
        full:
          - 1password
          - 1password-cli
          - chatgpt
          - iterm2
          - microsoft-edge
          - rekordbox
          - signal
          - spotify
          - visual-studio-code
          - vlc
          - vmware-fusion
      # Mac App Store apps (installed via `mas`, which is provided by the
      # `mas` formula listed under brew.brew.full).
      app-store:
        light: []
        full:
          - name: "1Password for Safari"
            id: 1569813296
          - name: "Home Assistant"
            id: 1099568401
          - name: "Kindle"
            id: 302584613
          - name: "Mela"
            id: 1568924476
          - name: "Microsoft 365"
            id: 1450038993
          - name: "Notability"
            id: 360593530
          - name: "Windows"
            id: 1295203466
          - name: "WireGuard"
            id: 1451685025
          - name: "Xcode"
            id: 497799835

  # Windows packages
  windows:
    # WinGet packages
    winget:
      light:
        - Fastfetch-cli.Fastfetch
        - Git.Git
        - Microsoft.PowerShell
        - twpayne.chezmoi
      full:
        - Docker.DockerDesktop
        - GitHub.Copilot
        - jdx.mise
        - Microsoft.APM
        - Microsoft.VisualStudioCode
        - Microsoft.WindowsTerminal
        - JanDeDobbeleer.OhMyPosh
        - Microsoft.WSL
        - Task.Task
      # Installed only when useYubiKey is true.
      yubikey:
        - Yubico.YubikeyManagerCLI

    # PowerShell modules (installed via PowerShellGet)
    powershell_modules:
      light:
        - Microsoft.WinGet.Client
      full:
        - oh-my-posh
        - Pester

    # PowerShell modules from Git repositories (installed via git clone)
    # Only installed in full mode on Windows
    powershell_git_modules:
      light: []
      full:
        # Path relative to PowerShell modules directory (~\Documents\PowerShell\Modules\)
        - name: "Office 365 Mail Alias"
          url: "https://github.com/DevSecNinja/Office365AliasModule.git"
          destination: "DevSecNinja.Office365AliasModule"

# VS Code extensions (optional, separate from package installation)
# Note: GitHub.copilot and GitHub.copilot-chat are now bundled as built-in
# extensions in current VS Code releases, so they are intentionally omitted
# here — installing them from the marketplace fails because the built-in
# version is newer than the marketplace version.
extensions:
  # Extensions for all platforms
  common: []

  # Windows-specific extensions
  windows:
    - ms-vscode-remote.remote-wsl

  # Linux-specific extensions
  linux:
    - ms-vscode-remote.remote-ssh

  # macOS-specific extensions
  darwin:
    - ms-vscode-remote.remote-ssh
